name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release Windows build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp release version
        id: version
        shell: bash
        run: |
          BASE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_VERSION="$(node -e "const [major, minor, patch] = process.argv[1].split('.').map(Number); const run = Number(process.argv[2]); console.log([major, minor, patch + run].join('.'))" "$BASE_VERSION" "$GITHUB_RUN_NUMBER")"
          npm version --no-git-tag-version "$RELEASE_VERSION"
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build web app
        run: npm run build:web

      - name: Build and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
